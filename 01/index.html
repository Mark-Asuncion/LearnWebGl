<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./lib/projection/perspective.js" type="text/javascript"></script>
    <script src="engine.js" type="text/javascript"></script>
    <style>
        html, body {
            padding: 0;
            margin: 0;
            width: 100%;
            height: 100%;
        }

        #gl {
            width: 800px;
            height: 600px;
        }
    </style>
</head>
<body>
    <canvas id="gl"></canvas><br />
<div style="padding: 1em;">
<label>
    X:
    <input
        type="range"
        min="-100"
        max="100"
        step="0.1"
        value="0"
        oninput="obj_pos[0] = parseFloat(this.value); this.nextElementSibling.textContent = this.value">
    <span>0</span>
</label>

<label>
    Y:
    <input
        type="range"
        min="-100"
        max="100"
        step="0.1"
        value="0"
        oninput="obj_pos[1] = parseFloat(this.value); this.nextElementSibling.textContent = this.value">
    <span>0</span>
</label>

<label>
    Z:
    <input
        type="range"
        min="-10"
        max="10"
        step="0.1"
        value="-5"
        oninput="obj_pos[2] = parseFloat(this.value); this.nextElementSibling.textContent = this.value">
    <span>-5</span>
</label>
</div>

<div style="padding: 1em;">
<label>
    X:
    <input
        type="range"
        min="0"
        max="360"
        step="0.1"
        value="0"
        oninput="rotation[0] = parseFloat(this.value); this.nextElementSibling.textContent = this.value">
    <span>0</span>
</label>

<label>
    Y:
    <input
        type="range"
        min="0"
        max="360"
        step="0.1"
        value="0"
        oninput="rotation[1] = parseFloat(this.value); this.nextElementSibling.textContent = this.value">
    <span>0</span>
</label>

<label>
    Z:
    <input
        type="range"
        min="0"
        max="360"
        step="0.1"
        value="0"
        oninput="rotation[2] = parseFloat(this.value); this.nextElementSibling.textContent = this.value">
    <span>0</span>
</label>
</div>
</body>
</html>
